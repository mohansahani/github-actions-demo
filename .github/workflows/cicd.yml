name: CICD

on:
  workflow_dispatch:
    inputs:
      environments:
        description: This is the environment value where this workflows run
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:

  code:
    runs-on: ubuntu-latest
    steps:
      - name: Code Commit
        run: echo "Code Commit done"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Code Build
        run: echo "Code Build done"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Code Test
        run: echo "Code testing done"
  deploy:
    if: inputs.environments == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Code Deploy
        run: echo "code deploy"
